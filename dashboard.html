<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="수련">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<meta name="theme-color" content="#0a0a0a">
<title>수련 — 학습 대시보드</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&display=swap');

:root{
  --ink:#0a0a0a;--paper:#f0e6d3;--paper-dark:#d4c4a8;--vermillion:#c23b22;
  --rust:#8b4513;--ash:#3a3a3a;--smoke:#6b6b6b;--mist:#9a9a8a;
  --deep:#111;--surface:#1a1a18;--surface2:#222220;--border:#333330;
  --r:8px;--st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:var(--ink);color:var(--paper-dark);
  font-family:'Noto Serif KR',serif;font-weight:400;line-height:1.7;
  -webkit-font-smoothing:antialiased;
  padding-top:var(--st);padding-bottom:var(--sb);overflow-x:hidden;
}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--ink)}
::-webkit-scrollbar-thumb{background:var(--ash);border-radius:2px}
a{color:inherit;text-decoration:none}button{font-family:inherit;cursor:pointer;border:none;background:none}

/* ═══ INK SPLASH OVERLAY ═══ */
#inkOverlay{
  position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:9999;
  pointer-events:none;display:none;
}
#inkOverlay.active{display:block}
#inkOverlay svg{width:100%;height:100%}

/* ═══ SLASH ANIMATION ═══ */
@keyframes slashIn{
  0%{clip-path:inset(0 100% 0 0);opacity:1}
  40%{clip-path:inset(0 0 0 0);opacity:1}
  100%{clip-path:inset(0 0 0 0);opacity:0}
}
@keyframes inkDrop{
  0%{transform:scale(0);opacity:0.9}
  50%{transform:scale(1.2);opacity:0.6}
  100%{transform:scale(2);opacity:0}
}
@keyframes brushStroke{
  0%{width:0;opacity:1}
  60%{width:100%;opacity:0.8}
  100%{width:100%;opacity:0}
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes breathe{
  0%,100%{opacity:0.4}50%{opacity:0.8}
}
@keyframes strikeThrough{
  0%{width:0}
  100%{width:100%}
}

.slash-line{
  position:fixed;top:50%;left:0;height:3px;
  background:linear-gradient(90deg,transparent,var(--vermillion),var(--paper),var(--vermillion),transparent);
  z-index:9998;animation:brushStroke 0.8s ease-out forwards;
  pointer-events:none;
}
.ink-circle{
  position:fixed;width:120px;height:120px;border-radius:50%;
  background:radial-gradient(circle,var(--vermillion) 0%,transparent 70%);
  z-index:9997;pointer-events:none;
  animation:inkDrop 1s ease-out forwards;
}

/* ═══ HEADER ═══ */
.hdr{
  text-align:center;padding:40px 20px 20px;position:relative;
  border-bottom:1px solid var(--border);
}
.hdr::after{
  content:'';position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);
  width:60px;height:3px;background:var(--vermillion);
}
.hdr h1{
  font-size:2.4rem;font-weight:900;color:var(--paper);
  letter-spacing:8px;margin-bottom:2px;
}
.hdr .sub{color:var(--mist);font-size:0.72rem;letter-spacing:3px}
.hdr .dt{color:var(--smoke);font-family:monospace;font-size:0.7rem;margin-top:8px;letter-spacing:1px}

/* ═══ QUOTE ═══ */
.quote-bar{
  text-align:center;padding:12px 20px;font-size:0.72rem;
  color:var(--mist);font-style:italic;letter-spacing:1px;
  border-bottom:1px solid rgba(51,51,48,0.5);
}

/* ═══ NAV ═══ */
.nav{
  display:flex;gap:0;margin:0 16px;position:sticky;top:0;z-index:90;
  background:var(--ink);border-bottom:1px solid var(--border);
}
.nav button{
  flex:1;padding:12px 0;color:var(--smoke);
  font-size:0.75rem;font-weight:400;letter-spacing:2px;
  transition:all 0.3s;position:relative;
}
.nav button:hover{color:var(--paper-dark)}
.nav button.on{color:var(--paper);font-weight:700}
.nav button.on::after{
  content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:20px;height:2px;background:var(--vermillion);
}

.wrap{max-width:800px;margin:0 auto;padding:20px 16px 100px}
.pnl{display:none}.pnl.on{display:block;animation:fadeUp 0.4s ease-out}

/* ═══ STAT STONES ═══ */
.stones{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.stone{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:20px 14px;text-align:center;position:relative;overflow:hidden;
}
.stone::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--vermillion),transparent);
  opacity:0.5;
}
.stone .n{font-size:2rem;font-weight:900;color:var(--paper);letter-spacing:2px}
.stone .l{font-size:0.65rem;color:var(--mist);margin-top:4px;letter-spacing:2px}

/* ═══ SECTION ═══ */
.sect{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:18px;margin-bottom:14px;position:relative;
}
.sect h3{
  font-size:0.8rem;font-weight:700;color:var(--paper);
  margin-bottom:12px;letter-spacing:2px;display:flex;align-items:center;gap:8px;
}
.sect h3::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,var(--border),transparent);
}

/* ═══ FEED ═══ */
.feed-item{
  display:flex;align-items:center;gap:12px;padding:12px;
  border-radius:6px;margin-bottom:6px;cursor:pointer;
  transition:all 0.2s;border-left:2px solid transparent;
}
.feed-item:hover{background:var(--surface2);border-left-color:var(--vermillion)}
.feed-item:active{transform:scale(0.98)}
.feed-icon{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;flex-shrink:0;
  background:rgba(194,59,34,0.08);border:1px solid rgba(194,59,34,0.15);
}
.feed-info{flex:1;min-width:0}
.feed-info .t{font-size:0.78rem;font-weight:700;color:var(--paper);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.feed-info .s{font-size:0.62rem;color:var(--smoke);letter-spacing:1px;margin-top:1px}
.badge{
  font-size:0.58rem;padding:3px 8px;border-radius:2px;
  font-weight:700;flex-shrink:0;letter-spacing:1px;
}
.badge.new{background:rgba(194,59,34,0.12);color:var(--vermillion)}
.badge.rev{background:rgba(139,69,19,0.12);color:var(--rust)}

/* ═══ COURSES ═══ */
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.ccard{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:16px;cursor:pointer;
  transition:all 0.3s;position:relative;overflow:hidden;
}
.ccard:hover{border-color:var(--vermillion);transform:translateY(-2px)}
.ccard::before{
  content:'';position:absolute;top:0;right:0;width:40px;height:40px;
  background:radial-gradient(circle at top right,rgba(194,59,34,0.06),transparent);
}
.ccard .icon{font-size:1.6rem;margin-bottom:8px}
.ccard .nm{font-size:0.82rem;font-weight:700;color:var(--paper);letter-spacing:1px;margin-bottom:6px}
.ccard .prog{height:2px;background:var(--ash);border-radius:1px;overflow:hidden;margin-bottom:6px}
.ccard .prog .bar{height:100%;border-radius:1px;background:var(--vermillion);transition:width 0.4s}
.ccard .cnt{font-size:0.62rem;color:var(--smoke);letter-spacing:1px}

/* Lesson list */
.llist{max-height:65vh;overflow-y:auto;padding-right:4px}
.ll-item{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  border-radius:4px;margin-bottom:2px;cursor:pointer;
  transition:0.15s;font-size:0.78rem;border-left:2px solid transparent;
}
.ll-item:hover{background:var(--surface2);border-left-color:var(--vermillion)}
.ll-item .num{
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:0.6rem;font-weight:900;flex-shrink:0;
}
.ll-item.done .num{background:rgba(194,59,34,0.15);color:var(--vermillion)}
.ll-item.undone .num{background:var(--surface2);color:var(--smoke)}
.ll-item .lt{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--paper-dark)}
.ll-item.done .lt{color:var(--smoke)}
.ll-item .ld{font-size:0.6rem;color:var(--smoke)}
.back-btn{display:inline-flex;align-items:center;gap:4px;font-size:0.75rem;color:var(--smoke);padding:8px 0;margin-bottom:12px;cursor:pointer;letter-spacing:1px}
.back-btn:hover{color:var(--paper)}

/* ═══ TIMER ═══ */
.timer-display{text-align:center;padding:40px 0 20px}
.timer-display .time{
  font-size:3.6rem;font-weight:900;color:var(--paper);
  letter-spacing:6px;font-family:monospace;
}
.timer-display .phase{font-size:0.75rem;color:var(--vermillion);margin-top:6px;letter-spacing:3px}
.timer-btns{display:flex;justify-content:center;gap:12px;margin-top:20px}
.timer-btns button{
  padding:12px 30px;border-radius:4px;font-size:0.8rem;
  font-weight:700;letter-spacing:2px;transition:0.2s;
}
.tbtn-start{background:var(--vermillion);color:var(--paper)}
.tbtn-start:hover{background:#a83020}
.tbtn-stop{background:var(--surface2);color:var(--paper-dark);border:1px solid var(--border)}
.tbtn-stop:hover{background:var(--ash)}
.timer-cfg{display:flex;justify-content:center;gap:20px;margin-top:16px}
.timer-cfg label{font-size:0.68rem;color:var(--smoke);letter-spacing:1px}
.timer-cfg input{
  width:48px;background:var(--surface2);border:1px solid var(--border);
  border-radius:4px;color:var(--paper);padding:4px 6px;font-size:0.75rem;text-align:center;
  font-family:monospace;
}

/* Log */
.log-tbl{width:100%;font-size:0.7rem;border-collapse:collapse}
.log-tbl th{text-align:left;color:var(--smoke);font-weight:400;padding:8px;border-bottom:1px solid var(--border);letter-spacing:1px;font-size:0.62rem}
.log-tbl td{padding:8px;border-bottom:1px solid rgba(51,51,48,0.3);color:var(--paper-dark)}

/* Chart */
.chart-bar{display:flex;align-items:flex-end;gap:6px;height:80px;margin-top:10px}
.chart-bar .cb{flex:1;background:var(--vermillion);border-radius:2px 2px 0 0;min-height:2px;transition:height 0.4s;opacity:0.7}
.chart-bar .cb:hover{opacity:1}
.chart-labels{display:flex;gap:6px;margin-top:6px}
.chart-labels span{flex:1;text-align:center;font-size:0.55rem;color:var(--smoke)}

/* Heatmap */
.heatmap{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-top:8px}
.hm-cell{aspect-ratio:1;border-radius:2px}
.hm-label{font-size:0.5rem;color:var(--smoke);text-align:center;padding:2px 0}

/* Tip */
.tip-box{
  background:linear-gradient(135deg,rgba(194,59,34,0.04),rgba(139,69,19,0.04));
  border:1px solid rgba(194,59,34,0.12);border-radius:var(--r);
  padding:16px;margin-bottom:14px;
}
.tip-box .tip-title{font-size:0.7rem;color:var(--vermillion);font-weight:700;margin-bottom:6px;letter-spacing:2px}
.tip-box .tip-text{font-size:0.7rem;color:var(--paper-dark);line-height:1.8}

/* Settings */
.set-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid rgba(51,51,48,0.3)}
.set-row .sl{font-size:0.78rem;color:var(--paper-dark)}.set-row .sr{font-size:0.7rem;color:var(--smoke)}
.set-btn{
  padding:10px 16px;background:var(--surface2);border:1px solid var(--border);
  border-radius:4px;font-size:0.72rem;color:var(--paper-dark);margin-top:8px;
  transition:0.2s;letter-spacing:1px;
}
.set-btn:hover{background:var(--ash)}
.set-btn.danger{color:var(--vermillion);border-color:rgba(194,59,34,0.3)}

/* Float timer */
.float-timer{
  position:fixed;bottom:80px;right:16px;background:var(--surface);
  border:1px solid var(--vermillion);border-radius:4px;
  padding:8px 16px;font-family:monospace;font-size:0.85rem;
  color:var(--vermillion);z-index:100;display:none;cursor:pointer;
  box-shadow:0 4px 24px rgba(194,59,34,0.2);letter-spacing:2px;
}
.float-timer.show{display:block}

/* Empty state */
.empty-state{text-align:center;padding:40px 20px;color:var(--smoke);font-size:0.78rem;letter-spacing:1px}

@media(max-width:480px){.wrap{padding:16px 12px 100px}.stones{grid-template-columns:1fr 1fr}.cgrid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="hdr">
  <h1>수 련</h1>
  <div class="sub">하루의 수련이 내일의 무기가 된다</div>
  <div class="dt" id="dateDisp"></div>
</div>
<div class="quote-bar" id="quoteBar"></div>

<div class="nav" id="nav">
  <button class="on" data-tab="home">도장</button>
  <button data-tab="course">수행</button>
  <button data-tab="timer">집중</button>
  <button data-tab="more">기록</button>
</div>

<div class="wrap">
<!-- ═══ HOME ═══ -->
<div class="pnl on" id="p-home">
  <div class="stones">
    <div class="stone"><div class="n" id="streakN">0</div><div class="l">연속 수련일</div></div>
    <div class="stone"><div class="n" id="todayMin">0</div><div class="l">오늘 수련(분)</div></div>
  </div>
  <!-- 상황별 가이드 배너 -->
  <a href="guide.html" style="display:block;background:linear-gradient(135deg,rgba(194,59,34,0.08),rgba(139,69,19,0.06));border:1px solid rgba(194,59,34,0.25);border-radius:var(--r);padding:16px 18px;margin-bottom:14px;transition:all 0.3s;text-decoration:none">
    <div style="display:flex;align-items:center;gap:12px">
      <span style="font-size:1.4rem">🧭</span>
      <div style="flex:1">
        <div style="font-size:0.82rem;font-weight:700;color:var(--paper);letter-spacing:1px">상황별 학습 가이드</div>
        <div style="font-size:0.65rem;color:var(--smoke);margin-top:2px;letter-spacing:1px">54개 실전 시나리오 · 6개 과목 크로스 학습</div>
      </div>
      <span style="color:var(--smoke);font-size:0.8rem">→</span>
    </div>
  </a>

  <div class="sect">
    <h3>오늘의 수련</h3>
    <div id="feedList"></div>
    <div id="feedEmpty" class="empty-state" style="display:none">
      오늘의 수련, 완료.<br>내일 다시 검을 잡아라.
    </div>
  </div>
  <div class="sect" id="reviewCard" style="display:none">
    <h3>복습 — 간격반복</h3>
    <div id="reviewList"></div>
  </div>
</div>

<!-- ═══ COURSES ═══ -->
<div class="pnl" id="p-course">
  <div id="courseGrid" class="cgrid"></div>
  <div id="courseDetail" style="display:none">
    <div class="back-btn" id="backBtn">← 수행 목록</div>
    <div class="sect">
      <h3 id="detailTitle"></h3>
      <div class="llist" id="lessonList"></div>
    </div>
  </div>
</div>

<!-- ═══ TIMER ═══ -->
<div class="pnl" id="p-timer">
  <div class="sect">
    <div class="timer-display">
      <div class="time" id="timerDisp">25:00</div>
      <div class="phase" id="phaseDisp">집중 준비</div>
    </div>
    <div class="timer-btns">
      <button class="tbtn-start" id="timerStart">시작</button>
      <button class="tbtn-stop" id="timerReset">리셋</button>
    </div>
    <div class="timer-cfg">
      <label>집중 <input type="number" id="cfgWork" value="25" min="1" max="90">분</label>
      <label>휴식 <input type="number" id="cfgBreak" value="5" min="1" max="30">분</label>
    </div>
  </div>
  <div class="sect">
    <h3>주간 수련량</h3>
    <div class="chart-bar" id="weekChart"></div>
    <div class="chart-labels" id="weekLabels"></div>
  </div>
  <div class="sect">
    <h3>수련 기록</h3>
    <table class="log-tbl">
      <thead><tr><th>날짜</th><th>과목</th><th>시간</th></tr></thead>
      <tbody id="logBody"></tbody>
    </table>
  </div>
</div>

<!-- ═══ MORE ═══ -->
<div class="pnl" id="p-more">
  <div id="tipBox" class="tip-box">
    <div class="tip-title">뇌과학 수련법</div>
    <div class="tip-text" id="tipText"></div>
  </div>
  <div class="sect">
    <h3>수련 히트맵 (30일)</h3>
    <div class="heatmap" id="heatmap"></div>
  </div>
  <div class="sect">
    <h3>전체 진행</h3>
    <div id="allProgress"></div>
  </div>
  <div class="sect">
    <h3>설정</h3>
    <div class="set-row"><span class="sl">데이터 버전</span><span class="sr">v3</span></div>
    <div class="set-row"><span class="sl">총 수련 기록</span><span class="sr" id="totalLogs">0건</span></div>
    <button class="set-btn" id="exportBtn">내보내기 — 데이터 백업</button>
    <button class="set-btn" id="importBtn">가져오기 — 데이터 복원</button>
    <input type="file" id="importFile" accept=".json" style="display:none">
    <button class="set-btn danger" id="resetBtn">초기화 — 데이터 삭제</button>
  </div>
</div>
</div>

<div class="float-timer" id="floatTimer"></div>

<script>

  {id:'vd',name:'차량동역학',icon:'⚔',color:'#c23b22',

/* ═══ STATE ═══ */
const SK='learn_data_v3';
const INTERVALS=[1,3,7,14,30,60];
function gs(){try{return JSON.parse(localStorage.getItem(SK))||{}}catch(e){return{}}}
function ss(s){localStorage.setItem(SK,JSON.stringify(s))}
function getProgress(cid){const s=gs();return(s[cid]||{}).done||[]}
function markDone(cid,day){
  const s=gs(),cd=s[cid]||{done:[],reviews:{}};
  if(!cd.done.includes(day)){cd.done.push(day);cd.done.sort((a,b)=>a-b)}
  const today=todayStr();
  cd.reviews[day]={stage:0,next:addDays(today,INTERVALS[0]),last:today};
  s[cid]=cd;ss(s);
}
function getReviews(cid){const s=gs();return(s[cid]||{}).reviews||{}}
function advanceReview(cid,day){
  const s=gs(),cd=s[cid]||{done:[],reviews:{}};
  const r=cd.reviews[day];if(!r)return;
  const ns=Math.min(r.stage+1,INTERVALS.length-1);
  r.stage=ns;r.last=todayStr();r.next=addDays(todayStr(),INTERVALS[ns]);
  s[cid]=cd;ss(s);
}
function addLog(cid,mins){const s=gs(),logs=s._logs||[];logs.push({date:todayStr(),cid,mins,ts:Date.now()});s._logs=logs;ss(s)}
function getLogs(){return(gs()._logs||[])}
function todayMins(){return getLogs().filter(l=>l.date===todayStr()).reduce((a,l)=>a+l.mins,0)}
function calcStreak(){
  const logs=getLogs(),dates=[...new Set(logs.map(l=>l.date))].sort().reverse();
  if(!dates.length)return 0;
  let streak=0,d=new Date();
  for(let i=0;i<400;i++){
    const ds=fmt(d);
    if(dates.includes(ds)){streak++;d.setDate(d.getDate()-1)}
    else if(i===0){d.setDate(d.getDate()-1)}
    else break;
  }
  return streak;
}
function todayStr(){return fmt(new Date())}
function fmt(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function addDays(ds,n){const d=new Date(ds);d.setDate(d.getDate()+n);return fmt(d)}
function dayNames(){return['일','월','화','수','목','금','토']}

/* ═══ SLASH ANIMATION ═══ */
function triggerSlash(){
  // Horizontal ink slash
  const line=document.createElement('div');
  line.className='slash-line';
  document.body.appendChild(line);
  setTimeout(()=>line.remove(),900);

  // Ink circle at center
  const circle=document.createElement('div');
  circle.className='ink-circle';
  circle.style.left=(window.innerWidth/2-60)+'px';
  circle.style.top=(window.innerHeight/2-60)+'px';
  document.body.appendChild(circle);
  setTimeout(()=>circle.remove(),1100);
}

/* ═══ HOME ═══ */
function renderHome(){
  document.getElementById('streakN').textContent=calcStreak();
  document.getElementById('todayMin').textContent=todayMins();
  renderFeed();renderReviewQueue();
}

function renderFeed(){
  const list=document.getElementById('feedList');
  const empty=document.getElementById('feedEmpty');
  list.textContent='';
  const today=todayStr();const items=[];
  C.forEach(c=>{
    const done=getProgress(c.id);
    const next=c.lessons.find(l=>!done.includes(l.d));
    if(next)items.push({type:'new',c,l:next});
  });
  C.forEach(c=>{
    const revs=getReviews(c.id);
    Object.entries(revs).forEach(([day,r])=>{
      if(r.next<=today){const l=c.lessons.find(x=>x.d===+day);if(l)items.push({type:'rev',c,l,r})}
    });
  });
  if(!items.length){empty.style.display='block';return}
  empty.style.display='none';
  items.forEach((item,i)=>{
    const row=document.createElement('div');
    row.className='feed-item';
    row.style.animation=`fadeUp 0.3s ease-out ${i*0.05}s both`;
    row.addEventListener('click',()=>openLesson(item.c,item.l,item.type==='rev'));
    const icon=document.createElement('div');icon.className='feed-icon';icon.textContent=item.c.icon;
    const info=document.createElement('div');info.className='feed-info';
    const t=document.createElement('div');t.className='t';t.textContent=`${item.l.d}일차 — ${item.l.t}`;
    const s=document.createElement('div');s.className='s';s.textContent=item.c.name;
    info.appendChild(t);info.appendChild(s);
    const badge=document.createElement('span');
    badge.className=item.type==='new'?'badge new':'badge rev';
    badge.textContent=item.type==='new'?'신규':'복습';
    row.appendChild(icon);row.appendChild(info);row.appendChild(badge);
    list.appendChild(row);
  });
}

function renderReviewQueue(){
  const card=document.getElementById('reviewCard');
  const list=document.getElementById('reviewList');
  list.textContent='';const today=todayStr();let count=0;
  C.forEach(c=>{
    const revs=getReviews(c.id);
    Object.entries(revs).forEach(([day,r])=>{
      if(r.next<=today){
        const l=c.lessons.find(x=>x.d===+day);if(!l)return;count++;
        const row=document.createElement('div');row.className='feed-item';
        row.addEventListener('click',()=>{advanceReview(c.id,+day);openLesson(c,l,true)});
        const icon=document.createElement('div');icon.className='feed-icon';icon.textContent='🔄';
        const info=document.createElement('div');info.className='feed-info';
        const t=document.createElement('div');t.className='t';t.textContent=`${c.icon} ${l.d}일차 — ${l.t}`;
        const s=document.createElement('div');s.className='s';s.textContent=`${c.name} · ${r.stage+1}/${INTERVALS.length}단계`;
        info.appendChild(t);info.appendChild(s);
        row.appendChild(icon);row.appendChild(info);list.appendChild(row);
      }
    });
  });
  card.style.display=count?'block':'none';
}

function openLesson(c,l,isReview){
  triggerSlash();
  setTimeout(()=>{
    window.open(`${c.folder}/${l.f}`,'_blank');
    if(!isReview)markDone(c.id,l.d);
    setTimeout(()=>{renderHome();renderCourses()},300);
  },400);
}

/* ═══ COURSES ═══ */
let currentCourse=null;
function renderCourses(){
  const grid=document.getElementById('courseGrid');
  const detail=document.getElementById('courseDetail');
  if(currentCourse){renderCourseDetail(currentCourse);return}
  grid.style.display='';detail.style.display='none';grid.textContent='';
  C.forEach(c=>{
    const done=getProgress(c.id);const pct=Math.round(done.length/c.lessons.length*100);
    const card=document.createElement('div');card.className='ccard';
    card.addEventListener('click',()=>{currentCourse=c;renderCourses()});
    const iconEl=document.createElement('div');iconEl.className='icon';iconEl.textContent=c.icon;
    const nm=document.createElement('div');nm.className='nm';nm.textContent=c.name;
    const prog=document.createElement('div');prog.className='prog';
    const bar=document.createElement('div');bar.className='bar';bar.style.width=pct+'%';
    prog.appendChild(bar);
    const cnt=document.createElement('div');cnt.className='cnt';cnt.textContent=`${done.length}/${c.lessons.length} (${pct}%)`;
    card.appendChild(iconEl);card.appendChild(nm);card.appendChild(prog);card.appendChild(cnt);
    grid.appendChild(card);
  });
}

function renderCourseDetail(c){
  document.getElementById('courseGrid').style.display='none';
  document.getElementById('courseDetail').style.display='';
  document.getElementById('detailTitle').textContent=`${c.icon} ${c.name}`;
  const list=document.getElementById('lessonList');list.textContent='';
  const done=getProgress(c.id);
  c.lessons.forEach(l=>{
    const isDone=done.includes(l.d);
    const row=document.createElement('div');row.className='ll-item '+(isDone?'done':'undone');
    row.addEventListener('click',()=>openLesson(c,l,false));
    const num=document.createElement('div');num.className='num';num.textContent=l.d;
    const lt=document.createElement('div');lt.className='lt';lt.textContent=l.t;
    const ld=document.createElement('div');ld.className='ld';ld.textContent=isDone?'✓':'';
    row.appendChild(num);row.appendChild(lt);row.appendChild(ld);list.appendChild(row);
  });
}
document.getElementById('backBtn').addEventListener('click',()=>{currentCourse=null;renderCourses()});

/* ═══ TIMER ═══ */
let tmState='idle',tmSec=0,tmTotal=0,tmInterval=null,tmIsWork=true;
const tmDisp=document.getElementById('timerDisp'),phDisp=document.getElementById('phaseDisp');
const tmStart=document.getElementById('timerStart'),tmReset=document.getElementById('timerReset');
const floatEl=document.getElementById('floatTimer');

function fmtTime(s){const m=Math.floor(s/60),sc=s%60;return`${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`}
function updateTimerDisplay(){
  tmDisp.textContent=fmtTime(tmSec);
  phDisp.textContent=tmIsWork?'집중 중':'휴식 중';
  if(tmState==='running'){floatEl.textContent=fmtTime(tmSec);floatEl.classList.add('show')}
}

tmStart.addEventListener('click',()=>{
  if(tmState==='idle'){
    const workMin=parseInt(document.getElementById('cfgWork').value)||25;
    tmSec=workMin*60;tmTotal=tmSec;tmIsWork=true;tmState='running';
    tmStart.textContent='정지';tmInterval=setInterval(tick,1000);updateTimerDisplay();
  } else if(tmState==='running'){
    tmState='paused';tmStart.textContent='계속';clearInterval(tmInterval);floatEl.classList.remove('show');
  } else if(tmState==='paused'){
    tmState='running';tmStart.textContent='정지';tmInterval=setInterval(tick,1000);updateTimerDisplay();
  }
});
tmReset.addEventListener('click',()=>{
  clearInterval(tmInterval);tmState='idle';
  const workMin=parseInt(document.getElementById('cfgWork').value)||25;
  tmSec=workMin*60;tmDisp.textContent=fmtTime(tmSec);phDisp.textContent='집중 준비';
  tmStart.textContent='시작';floatEl.classList.remove('show');
});

function tick(){
  if(tmSec>0){tmSec--;updateTimerDisplay();document.title=`${fmtTime(tmSec)} — 수련`;return}
  clearInterval(tmInterval);
  if(tmIsWork){
    const worked=Math.round(tmTotal/60);addLog('_timer',worked);
    triggerSlash();
    try{new Notification('수련 완료',{body:`${worked}분 집중, 훌륭하다.`})}catch(e){}
    tmIsWork=false;tmSec=(parseInt(document.getElementById('cfgBreak').value)||5)*60;
    tmTotal=tmSec;tmInterval=setInterval(tick,1000);
  } else {
    try{new Notification('휴식 종료',{body:'다시 검을 잡아라.'})}catch(e){}
    tmState='idle';tmStart.textContent='시작';
    const workMin=parseInt(document.getElementById('cfgWork').value)||25;
    tmSec=workMin*60;tmIsWork=true;tmDisp.textContent=fmtTime(tmSec);phDisp.textContent='집중 준비';
    floatEl.classList.remove('show');
  }
  updateTimerDisplay();renderHome();
}
floatEl.addEventListener('click',()=>{nav.querySelector('[data-tab="timer"]').click()});

/* ═══ WEEKLY CHART ═══ */
function renderWeekChart(){
  const chart=document.getElementById('weekChart'),labels=document.getElementById('weekLabels');
  chart.textContent='';labels.textContent='';
  const today=new Date(),dn=dayNames(),data=[];
  for(let i=6;i>=0;i--){
    const d=new Date(today);d.setDate(d.getDate()-i);const ds=fmt(d);
    data.push({day:dn[d.getDay()],mins:getLogs().filter(l=>l.date===ds).reduce((a,l)=>a+l.mins,0)});
  }
  const max=Math.max(...data.map(d=>d.mins),1);
  data.forEach(d=>{
    const bar=document.createElement('div');bar.className='cb';
    bar.style.height=Math.max(2,d.mins/max*100)+'%';if(d.mins)bar.title=d.mins+'분';
    chart.appendChild(bar);
    const lb=document.createElement('span');lb.textContent=d.day;labels.appendChild(lb);
  });
}

/* ═══ LOG TABLE ═══ */
function renderLogs(){
  const body=document.getElementById('logBody');body.textContent='';
  getLogs().slice(-15).reverse().forEach(l=>{
    const tr=document.createElement('tr');
    const td1=document.createElement('td');td1.textContent=l.date;
    const td2=document.createElement('td');const c=C.find(x=>x.id===l.cid);
    td2.textContent=c?c.name:(l.cid==='_timer'?'⏱ 집중':l.cid);
    const td3=document.createElement('td');td3.textContent=l.mins+'분';
    tr.appendChild(td1);tr.appendChild(td2);tr.appendChild(td3);body.appendChild(tr);
  });
  document.getElementById('totalLogs').textContent=getLogs().length+'건';
}

/* ═══ HEATMAP ═══ */
function renderHeatmap(){
  const hm=document.getElementById('heatmap');hm.textContent='';
  dayNames().forEach(d=>{const lb=document.createElement('div');lb.className='hm-label';lb.textContent=d;hm.appendChild(lb)});
  const today=new Date(),start=new Date(today);start.setDate(start.getDate()-29);start.setDate(start.getDate()-start.getDay());
  const logs=getLogs(),dateMap={};logs.forEach(l=>{dateMap[l.date]=(dateMap[l.date]||0)+l.mins});
  const maxMin=Math.max(...Object.values(dateMap),1);
  for(let d=new Date(start);d<=today;d.setDate(d.getDate()+1)){
    const ds=fmt(d),mins=dateMap[ds]||0;
    const cell=document.createElement('div');cell.className='hm-cell';
    cell.style.background=mins?`rgba(194,59,34,${Math.max(0.15,mins/maxMin)})`:'rgba(51,51,48,0.3)';
    cell.title=`${ds}: ${mins}분`;hm.appendChild(cell);
  }
}
